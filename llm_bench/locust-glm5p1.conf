# Locust configuration for GLM 5.1 TPS benchmarking
# This configuration is optimized for measuring tokens per second (TPS) throughput
#
# Usage:
#   locust --config locust-glm5p1.conf -H <deployment_url> -k <api_key>
#
# Example with Fireworks deployment:
#   locust --config locust-glm5p1.conf \
#     -H https://api.fireworks.ai/inference \
#     -k $FIREWORKS_API_KEY \
#     -m accounts/fireworks/models/glm-5p1

locustfile = load_test.py
headless = yes
reset-stats = yes

# Default host - override with -H flag for your deployment
host = https://api.fireworks.ai/inference

# Provider settings
provider = fireworks

# Model - override with -m flag if needed
model = accounts/fireworks/models/glm-5p1

# Use chat completions API with streaming for accurate TPS measurement
chat = yes
stream = yes

# Default concurrency settings for TPS testing
# Start with moderate concurrency to find saturation point
users = 16
spawn-rate = 4

# Default test duration
run-time = 2min

# Token settings optimized for TPS measurement
# Longer outputs give more accurate TPS measurements
prompt-tokens = 512
max-tokens = 256
max-tokens-distribution = constant
temperature = 1.0
